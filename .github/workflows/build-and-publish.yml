name: IGO Container CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: igov2-frontend
  BACKEND_IMAGE: igov2-backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run targeted frontend tests
        run: npm run test:run -- src/tests/comic-info.test.ts src/tests/tesseract-runtime.test.ts src/tests/xss-replay.test.ts src/tests/digital-sign-pdf.test.ts

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

  docker-build-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate local compose config
        env:
          SESSION_SECRET: 12345678901234567890123456789012
          CORS_ORIGIN: http://localhost:8081
        run: docker compose config --quiet

      - name: Validate production compose config
        env:
          IGO_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE }}:branch-main
          IGO_BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}:branch-main
          DB_NAME: igopdf
          DB_USER: igopdf
          DB_PASSWORD: ci-database-password
          SESSION_SECRET: 12345678901234567890123456789012
          CORS_ORIGIN: https://igo.example.go.id
        run: docker compose -f deploy/docker-compose.prod.yml config --quiet

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE }}:ci
          cache-from: type=gha,scope=igov2-frontend

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}:ci
          cache-from: type=gha,scope=igov2-backend

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - docker-build-check
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch,prefix=branch-
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch,prefix=branch-
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=igov2-frontend
          cache-to: type=gha,mode=max,scope=igov2-frontend

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=igov2-backend
          cache-to: type=gha,mode=max,scope=igov2-backend
