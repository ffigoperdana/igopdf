name: Feature Request
description: Suggest a new feature for Internal Government Operation
title: "(Feature) "
labels: ["enhancement", "needs triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What functionality are you requesting?
      placeholder: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature useful for BPDP internal document workflows?
      placeholder: Explain why you need this feature.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any examples, screenshots, or related context.
    validations:
      required: false
