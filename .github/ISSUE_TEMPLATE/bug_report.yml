name: Bug Report
description: Report a bug in Internal Government Operation
title: "(Bug) "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Important Notice
        Bug reports without logs or a sample file demonstrating the issue may be difficult to investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Upload file '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: console-logs
    attributes:
      label: Console Logs
      description: Open browser DevTools (F12 -> Console tab) and paste any errors here.
      placeholder: Paste console logs here...
      render: shell
    validations:
      required: true

  - type: textarea
    id: sample-file
    attributes:
      label: Sample PDF or File
      description: Attach a sample PDF that reproduces the issue, or describe how to create one.
      placeholder: Drag and drop your file here, or describe how to reproduce with any PDF.
    validations:
      required: true

  - type: input
    id: igo-version
    attributes:
      label: IGO Version
      description: Check the footer, package.json, or deployed image tag.
      placeholder: "igov2 sha/tag"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help us debug this issue.
    validations:
      required: false
