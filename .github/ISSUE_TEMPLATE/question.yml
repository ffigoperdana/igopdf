name: Question
description: Ask a question about Internal Government Operation
title: "(Question) "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Your question here.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant code snippets, screenshots, or scenarios.
    validations:
      required: false
