services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-igopdf}
      POSTGRES_USER: ${DB_USER:-igopdf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-igopdf_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USER:-igopdf} -d ${DB_NAME:-igopdf}']
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: 0.5
    mem_limit: 512m
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-igopdf}
      DB_USER: ${DB_USER:-igopdf}
      DB_PASSWORD: ${DB_PASSWORD:-igopdf_password}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
      SESSION_TIMEOUT_HOURS: ${SESSION_TIMEOUT_HOURS:-3}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-15}
      SERVER_COMPRESSION_ENABLED: ${SERVER_COMPRESSION_ENABLED:-true}
      COMPRESSION_JOBS_DIR: /var/lib/igo-jobs
      CLIENT_COMPRESSION_MAX_BYTES: ${CLIENT_COMPRESSION_MAX_BYTES:-104857600}
      SERVER_BALANCED_MAX_BYTES: ${SERVER_BALANCED_MAX_BYTES:-524288000}
      SERVER_COMPRESSION_MAX_BYTES: ${SERVER_COMPRESSION_MAX_BYTES:-1073741824}
      COMPRESSION_UPLOAD_CHUNK_BYTES: ${COMPRESSION_UPLOAD_CHUNK_BYTES:-26214400}
      COMPRESSION_UPLOAD_IDLE_TIMEOUT_MS: ${COMPRESSION_UPLOAD_IDLE_TIMEOUT_MS:-1800000}
      COMPRESSION_UPLOAD_MAX_AGE_MS: ${COMPRESSION_UPLOAD_MAX_AGE_MS:-10800000}
      COMPRESSION_DISK_HEADROOM_MULTIPLIER: ${COMPRESSION_DISK_HEADROOM_MULTIPLIER:-3}
      COMPRESSION_DISK_MINIMUM_FREE_BYTES: ${COMPRESSION_DISK_MINIMUM_FREE_BYTES:-1073741824}
      COMPRESSION_JOB_TIMEOUT_MS: ${COMPRESSION_JOB_TIMEOUT_MS:-2700000}
      COMPRESSION_RETENTION_MS: ${COMPRESSION_RETENTION_MS:-900000}
      COMPRESSION_WORKER_POLL_MS: ${COMPRESSION_WORKER_POLL_MS:-2000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pdf_jobs:/var/lib/igo-jobs
    cpus: 0.5
    mem_limit: 512m
    restart: unless-stopped

  pdf-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ['node', 'dist/worker.js']
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-igopdf}
      DB_USER: ${DB_USER:-igopdf}
      DB_PASSWORD: ${DB_PASSWORD:-igopdf_password}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SERVER_COMPRESSION_ENABLED: ${SERVER_COMPRESSION_ENABLED:-true}
      COMPRESSION_JOBS_DIR: /var/lib/igo-jobs
      CLIENT_COMPRESSION_MAX_BYTES: ${CLIENT_COMPRESSION_MAX_BYTES:-104857600}
      SERVER_BALANCED_MAX_BYTES: ${SERVER_BALANCED_MAX_BYTES:-524288000}
      SERVER_COMPRESSION_MAX_BYTES: ${SERVER_COMPRESSION_MAX_BYTES:-1073741824}
      COMPRESSION_UPLOAD_IDLE_TIMEOUT_MS: ${COMPRESSION_UPLOAD_IDLE_TIMEOUT_MS:-1800000}
      COMPRESSION_UPLOAD_MAX_AGE_MS: ${COMPRESSION_UPLOAD_MAX_AGE_MS:-10800000}
      COMPRESSION_JOB_TIMEOUT_MS: ${COMPRESSION_JOB_TIMEOUT_MS:-2700000}
      COMPRESSION_RETENTION_MS: ${COMPRESSION_RETENTION_MS:-900000}
      COMPRESSION_WORKER_POLL_MS: ${COMPRESSION_WORKER_POLL_MS:-2000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pdf_jobs:/var/lib/igo-jobs
    cpus: 1.5
    mem_limit: 4g
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    cpus: 0.25
    mem_limit: 128m
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${HTTP_PORT:-8081}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    cpus: 0.25
    mem_limit: 128m
    restart: unless-stopped

volumes:
  postgres_data:
  pdf_jobs:
