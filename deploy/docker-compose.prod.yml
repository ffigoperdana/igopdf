services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${IGO_BACKEND_IMAGE}
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SESSION_TIMEOUT_HOURS: ${SESSION_TIMEOUT_HOURS:-3}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-15}
      CAPTCHA_EXPIRY_MINUTES: ${CAPTCHA_EXPIRY_MINUTES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BULK_IMPORT_DEFAULT_PASSWORD: ${BULK_IMPORT_DEFAULT_PASSWORD:-}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_LOGIN_FIELD: ${LDAP_LOGIN_FIELD:-sAMAccountName}
      LDAP_TIMEOUT_MS: ${LDAP_TIMEOUT_MS:-5000}
      LDAP_TLS_REJECT_UNAUTHORIZED: ${LDAP_TLS_REJECT_UNAUTHORIZED:-true}
      LDAP_TLS_CA_FILE: ${LDAP_TLS_CA_FILE:-}
      LDAP_TLS_MIN_VERSION: ${LDAP_TLS_MIN_VERSION:-}
      SERVER_COMPRESSION_ENABLED: ${SERVER_COMPRESSION_ENABLED:-true}
      COMPRESSION_JOBS_DIR: /var/lib/igo-jobs
      CLIENT_COMPRESSION_MAX_BYTES: ${CLIENT_COMPRESSION_MAX_BYTES:-104857600}
      SERVER_BALANCED_MAX_BYTES: ${SERVER_BALANCED_MAX_BYTES:-524288000}
      SERVER_COMPRESSION_MAX_BYTES: ${SERVER_COMPRESSION_MAX_BYTES:-1073741824}
      COMPRESSION_JOB_TIMEOUT_MS: ${COMPRESSION_JOB_TIMEOUT_MS:-2700000}
      COMPRESSION_RETENTION_MS: ${COMPRESSION_RETENTION_MS:-900000}
      COMPRESSION_WORKER_POLL_MS: ${COMPRESSION_WORKER_POLL_MS:-2000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pdf_jobs:/var/lib/igo-jobs
    restart: unless-stopped

  pdf-worker:
    image: ${IGO_BACKEND_IMAGE}
    command: ['node', 'dist/worker.js']
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      SERVER_COMPRESSION_ENABLED: ${SERVER_COMPRESSION_ENABLED:-true}
      COMPRESSION_JOBS_DIR: /var/lib/igo-jobs
      CLIENT_COMPRESSION_MAX_BYTES: ${CLIENT_COMPRESSION_MAX_BYTES:-104857600}
      SERVER_BALANCED_MAX_BYTES: ${SERVER_BALANCED_MAX_BYTES:-524288000}
      SERVER_COMPRESSION_MAX_BYTES: ${SERVER_COMPRESSION_MAX_BYTES:-1073741824}
      COMPRESSION_JOB_TIMEOUT_MS: ${COMPRESSION_JOB_TIMEOUT_MS:-2700000}
      COMPRESSION_RETENTION_MS: ${COMPRESSION_RETENTION_MS:-900000}
      COMPRESSION_WORKER_POLL_MS: ${COMPRESSION_WORKER_POLL_MS:-2000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pdf_jobs:/var/lib/igo-jobs
    cpus: 1.5
    mem_limit: 4g
    restart: unless-stopped

  frontend:
    image: ${IGO_FRONTEND_IMAGE}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${HTTP_PORT:-8081}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  pdf_jobs:
