services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: igopdf
      POSTGRES_USER: igopdf
      POSTGRES_PASSWORD: igopdf_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_dev_data:
